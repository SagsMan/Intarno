kind = "web"
previewPath = "/"
title = "Intarno"
version = "1.0.0"
id = "artifacts/intarno"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23186

[services.development]
run = "pnpm --filter @workspace/intarno run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/intarno", "run", "build" ]
publicDir = "artifacts/intarno/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23186"
BASE_PATH = "/"
